<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="#" class="nav-brand">
                <i class="fas fa-circle-user"></i>
                <span>我的主页</span>
            </a>
            <div class="nav-links">
                <a href="#about">关于</a>
                <a href="#works">作品</a>
                <a href="https://github.com/babyweiwei" target="_blank">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-inner">
            <h1>你好，我是创作者</h1>
            <p>记录学习历程与实习成果的个人空间</p>
            <div class="hero-meta">
                <span><i class="fas fa-file"></i> <strong id="fileCount">0</strong> 个作品</span>
                <span class="divider">|</span>
                <span>持续更新中</span>
            </div>
            <a href="#works" class="hero-btn">查看作品</a>
        </div>
    </header>

    <section id="about" class="section">
        <div class="container">
            <h2 class="section-title">关于</h2>
            <div class="about-content">
                <p>这里展示我在过往实习和学习经历中的成果产出。每一份作品都是成长的见证，记录着从理论到实践的探索过程。</p>
            </div>
        </div>
    </section>

    <section id="works" class="section section-gray">
        <div class="container">
            <h2 class="section-title">作品</h2>
            
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="document">文档</button>
                <button class="filter-btn" data-filter="image">图片</button>
                <button class="filter-btn" data-filter="code">代码</button>
            </div>

            <div id="filesGrid" class="files-grid"></div>
            
            <div id="emptyState" class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>暂无文件</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 · 用 <i class="fas fa-heart"></i> 制作</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

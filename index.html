<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的已有工作 - 文件分享平台</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <i class="fab fa-github"></i>
                    <span>我的已有工作</span>
                </div>
                <div class="nav-links">
                    <a href="#home" class="nav-link">首页</a>
                    <a href="#files" class="nav-link">文件列表</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <section id="home" class="hero">
            <div class="hero-content">
                <div class="hero-text">
                    <h1 class="hero-title">我的已有工作</h1>
                    <p class="hero-subtitle">一个简洁的文件分享平台</p>
                    <div class="hero-features">
                        <div class="feature-item">
                            <i class="fas fa-cloud"></i>
                            <span>GitHub 存储</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-shield-alt"></i>
                            <span>安全可靠</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-sync"></i>
                            <span>实时同步</span>
                        </div>
                    </div>
                </div>
                <div class="hero-visual">
                    <div class="floating-card">
                        <i class="fas fa-file-alt"></i>
                        <div class="card-dots"></div>
                    </div>
                    <div class="floating-card" style="animation-delay: 0.2s;">
                        <i class="fas fa-image"></i>
                        <div class="card-dots"></div>
                    </div>
                    <div class="floating-card" style="animation-delay: 0.4s;">
                        <i class="fas fa-code"></i>
                        <div class="card-dots"></div>
                    </div>
                </div>
                <div class="hero-buttons">
                    <a href="#files" class="btn btn-primary">
                        <i class="fas fa-folder"></i> 浏览文件
                    </a>
                    <a href="https://github.com/babyweiwei" class="btn btn-outline" target="_blank">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                </div>
            </div>
        </section>

        <section id="files" class="files-section">
            <div class="container">
                <h2 class="section-title">文件列表</h2>
                <div class="files-container">
                    <div class="files-grid" id="filesGrid">
                        <!-- 文件将动态添加到这里 -->
                    </div>
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-folder-open"></i>
                        <p>暂无文件</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 我的已有工作. 使用 <i class="fas fa-heart"></i> 制作</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

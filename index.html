<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的已有工作 - 文件分享平台</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <i class="fab fa-github"></i>
                    <span>我的已有工作</span>
                </div>
                <div class="nav-links">
                    <a href="#home" class="nav-link">首页</a>
                    <a href="#upload" class="nav-link">上传文件</a>
                    <a href="#files" class="nav-link">文件列表</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <section id="home" class="hero">
            <div class="hero-content">
                <h1 class="hero-title">我的已有工作</h1>
                <p class="hero-subtitle">一个简洁的文件分享平台</p>
                <div class="hero-buttons">
                    <a href="#upload" class="btn btn-primary">
                        <i class="fas fa-upload"></i> 上传文件
                    </a>
                    <a href="#files" class="btn btn-secondary">
                        <i class="fas fa-folder"></i> 浏览文件
                    </a>
                    <a href="https://github.com/babyweiwei" class="btn btn-outline" target="_blank">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                </div>
            </div>
        </section>

        <section id="upload" class="upload-section">
            <div class="upload-sidebar">
                <h2 class="sidebar-title">上传文件</h2>
                <div class="upload-info">
                    <p><strong>文件存储说明：</strong></p>
                    <p>• 文件存储在GitHub仓库的 <code>uploaded-files</code> 目录</p>
                    <p>• 需要手动上传文件到GitHub仓库</p>
                    <p>• 点击下方按钮获取上传链接</p>
                    <button class="btn btn-small" onclick="fileManager.showUploadHelp()">查看上传教程</button>
                </div>
                <div class="upload-container">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-content">
                            <i class="fas fa-cloud-upload-alt upload-icon"></i>
                            <h3>选择要上传的文件</h3>
                            <p>文件将存储在GitHub仓库</p>
                            <input type="file" id="fileInput" multiple hidden>
                            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                                选择文件
                            </button>
                        </div>
                    </div>
                    <div class="upload-progress" id="uploadProgress" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="progress-text" id="progressText">0%</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="files" class="files-section">
            <div class="container">
                <h2 class="section-title">文件列表</h2>
                <div class="files-container">
                    <div class="files-grid" id="filesGrid">
                        <!-- 文件将动态添加到这里 -->
                    </div>
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-folder-open"></i>
                        <p>暂无文件，请先上传一些文件</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 我的已有工作. 使用 <i class="fas fa-heart"></i> 制作</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

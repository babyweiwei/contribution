# GitHub Pages Configuration
title: GitHub 文件分享平台
description: 一个现代化的开发者展示平台

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - deploy-instructions.md
  - github-setup-guide.md
  - profile-readme.md
  - .github/
